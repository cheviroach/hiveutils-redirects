<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://kykbnqqdfhzzdtkpdwuy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5a2JucXFkZmh6emR0a3Bkd3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTc4MjksImV4cCI6MjA4ODkzMzgyOX0.jI7cburkLgjE2dtovKS4SSLrUNyzHA0Q8IubdYYu_a8";

        document.getElementById('saveBtn').onclick = async () => {
            const btn = document.getElementById('saveBtn');
            const status = document.getElementById('status');
            const password = document.getElementById('passInput').value;

            if (password.length < 6) {
                status.innerText = "❌ Mínimo 6 caracteres";
                status.style.color = "red";
                return;
            }

            btn.disabled = true;
            btn.innerText = "ACTUALIZANDO...";
            status.style.color = "#666";
            status.innerText = "Validando sesión...";

            try {
                // Extraer tokens del hash de la URL
                const hash = window.location.hash.substring(1);
                const params = new URLSearchParams(hash);
                const accessToken = params.get("access_token");
                const refreshToken = params.get("refresh_token");

                // Inicializar Supabase sin persistencia para evitar choques
                const supabase = supabasejs.createClient(SB_URL, SB_KEY, {
                    auth: { persistSession: false, autoRefreshToken: false }
                });

                // Forzar la sesión con el token de la URL
                if (accessToken) {
                    await supabase.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                }

                // Cambiar contraseña
                const { error } = await supabase.auth.updateUser({ password: password });

                if (error) {
                    status.innerText = "❌ Error: " + error.message;
                    status.style.color = "red";
                    btn.disabled = false;
                    btn.innerText = "REINTENTAR";
                } else {
                    status.innerText = "✅ ¡Éxito! Ya puedes cerrar esta pestaña.";
                    status.style.color = "green";
                    btn.style.display = "none";
                    document.getElementById('passInput').style.display = "none";
                }
            } catch (err) {
                status.innerText = "❌ Error de conexión o link expirado.";
                status.style.color = "red";
                btn.disabled = false;
                btn.innerText = "REINTENTAR";
            }
        };
    </script>
