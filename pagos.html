<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar Licencia Pro | HiveUtils</title>
    <script src="https://www.paypal.com/sdk/js?client-id=Affk5jjIc6YdBMfnPVUq3iquE_7oSm0CeMoRotS9BxIsyxouhHqY3uSJrUrHVP70d7ewb-rskzsam6Vo&currency=USD&components=buttons&enable-funding=paylater,card,applepay"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .checkout-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 26px;
        }
        .header p {
            color: #666;
            margin: 0;
            font-size: 15px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
            font-size: 14px;
        }
        select, input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #fcfcfc;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        #email_error {
            color: #dc3545;
            display: none;
            margin-top: 8px;
            font-size: 13px;
            font-weight: 500;
        }
        .logo-pro {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 14px;
            margin-left: 5px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="checkout-card">
        <div class="header">
            <h1>HiveUtils <span class="logo-pro">PRO</span></h1>
            <p>Desbloquea el poder total de la IA sin límites.</p>
        </div>

        <div class="form-group">
            <label for="plan_select">Selecciona tu Plan:</label>
            <select id="plan_select">
                <option value="4.00">1 Mes - $4 USD</option>
                <option value="10.00">3 Meses - $10 USD</option>
                <option value="18.00">6 Meses - $18 USD</option>
                <option value="30.00">1 Año - $30 USD (Mejor valor)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="email_input">Correo asociado a tu cuenta:</label>
            <input type="email" id="email_input" placeholder="ejemplo@correo.com">
            <div id="email_error">⚠️ Por favor, ingresa un correo electrónico válido.</div>
        </div>

        <div id="paypal-button-container-pro" style="min-height: 150px; margin-top: 25px;"></div>
    </div>

    <script>
        // Función para validar formato de email con Regex
        function validarEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        paypal.Buttons({
            onClick: function(data, actions) {
                const userEmail = document.getElementById('email_input').value.trim();
                const emailInput = document.getElementById('email_input');
                const errorMessage = document.getElementById('email_error');

                if (!validarEmail(userEmail)) {
                    emailInput.style.border = "2px solid #dc3545";
                    emailInput.style.backgroundColor = "#fff8f8";
                    errorMessage.style.display = "block";
                    return actions.reject();
                } else {
                    emailInput.style.border = "1px solid #ccc";
                    emailInput.style.backgroundColor = "#fcfcfc";
                    errorMessage.style.display = "none";
                    return actions.resolve();
                }
            },

            createOrder: function(data, actions) {
                const userEmail = document.getElementById('email_input').value.trim();
                const planSelect = document.getElementById('plan_select');
                const montoSeleccionado = planSelect.value;
                const nombrePlan = planSelect.options[planSelect.selectedIndex].text;

                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: montoSeleccionado,
                            currency_code: 'USD'
                        },
                        description: `Licencia Pro Hive Utils - ${nombrePlan}`,
                        custom_id: userEmail, 
                        payee: {
                            email_address: "cheviroach_001-rujanojose@yahoo.com" 
                        }
                    }],
                    application_context: {
                        brand_name: "HIVE UTILS PRO",
                        shipping_preference: 'NO_SHIPPING',
                        user_action: 'PAY_NOW'
                    }
                });
            },

            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    const finalEmail = document.getElementById('email_input').value.trim();
                    const container = document.getElementById('paypal-button-container-pro');
                    
                    container.innerHTML = `
                        <div style="padding: 25px; border: 2px solid #28a745; background-color: #f8fff9; color: #155724; border-radius: 12px; text-align: center;">
                            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
                            <h2 style="margin: 0 0 10px 0; color: #28a745; font-weight: bold;">¡Pago Exitoso!</h2>
                            <p style="font-size: 16px; margin-bottom: 8px;">Tu licencia ha sido vinculada a:</p>
                            <div style="background: #e9f7ef; padding: 10px; border-radius: 6px; display: inline-block; margin-bottom: 15px; border: 1px solid #c3e6cb;">
                                <b>${finalEmail}</b>
                            </div>
                            <hr style="border: 0; border-top: 1px solid #c3e6cb; margin: 15px 0;">
                            <p style="font-size: 13px; color: #6c757d;">Ya puedes volver a la extensión y disfrutar de las funciones Pro.</p>
                        </div>
                    `;
                });
            },

            onError: function(err) {
                console.error("Error en el flujo de PayPal:", err);
                const userEmail = document.getElementById('email_input').value.trim();
                if (validarEmail(userEmail)) {
                    alert("Ocurrió un error con la plataforma de pago. Por favor, intenta de nuevo o desactiva tu bloqueador de anuncios.");
                }
            }
        }).render('#paypal-button-container-pro');
    </script>
</body>
</html>
