<div style="margin-bottom: 15px; font-family: 'Segoe UI', sans-serif;">
    <label for="plan_select" style="display:block; margin-bottom:5px; font-weight:bold; color: #333;">Selecciona tu Plan Pro:</label>
    <select id="plan_select" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background-color: #fff; font-size: 16px;">
        <option value="4.00">1 Mes - 0.10$</option>
        <option value="10.00">3 Meses - 10$</option>
        <option value="18.00">6 Meses - 18$</option>
        <option value="30.00">1 Año - 30$</option>
    </select>
</div>

<div style="margin-bottom: 15px; font-family: 'Segoe UI', sans-serif;">
    <label for="email_input" style="display:block; margin-bottom:5px; font-weight:bold; color: #333;">Correo de acceso:</label>
    <input type="email" id="email_input" placeholder="ejemplo@correo.com" 
           style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: all 0.3s;">
    <small id="email_error" style="color: #dc3545; display: none; margin-top: 5px; font-size: 14px; font-weight: 500;">⚠️ Por favor, ingresa un correo electrónico válido para asignar tu licencia.</small>
</div>

<div id="paypal-button-container-pro" style="min-height: 150px;"></div>

<script src="https://www.paypal.com/sdk/js?client-id=Affk5jjIc6YdBMfnPVUq3iquE_7oSm0CeMoRotS9BxIsyxouhHqY3uSJrUrHVP70d7ewb-rskzsam6Vo&currency=USD&components=buttons&enable-funding=paylater,card,applepay"></script>

<script>
    // Función para validar formato de email con Regex
    function validarEmail(email) {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(email);
    }

    paypal.Buttons({
        // onClick: Se activa al hacer clic en el botón de PayPal
        onClick: function(data, actions) {
            const userEmail = document.getElementById('email_input').value.trim();
            const emailInput = document.getElementById('email_input');
            const errorMessage = document.getElementById('email_error');

            if (!validarEmail(userEmail)) {
                // Efecto visual de error
                emailInput.style.border = "2px solid #dc3545";
                emailInput.style.backgroundColor = "#fff8f8";
                errorMessage.style.display = "block";
                
                alert("Debes ingresar un correo electrónico válido para poder activar tu licencia Pro después del pago.");
                
                // Detiene la apertura de la ventana de PayPal
                return actions.reject();
            } else {
                // Restablecer estilos si es válido
                emailInput.style.border = "1px solid #ccc";
                emailInput.style.backgroundColor = "#fff";
                errorMessage.style.display = "none";
                return actions.resolve();
            }
        },

        createOrder: function(data, actions) {
            const userEmail = document.getElementById('email_input').value.trim();
            const montoSeleccionado = document.getElementById('plan_select').value;
            const nombrePlan = document.getElementById('plan_select').options[document.getElementById('plan_select').selectedIndex].text;

            return actions.order.create({
                purchase_units: [{
                    amount: {
                        value: montoSeleccionado,
                        currency_code: 'USD'
                    },
                    description: `Licencia Pro Hive Utils - ${nombrePlan}`,
                    custom_id: userEmail, // Este ID llegará a tu webhook/Supabase
                    payee: {
                        email_address: "cheviroach_001-rujanojose@yahoo.com" 
                    }
                }],
                application_context: {
                    brand_name: "HIVE UTILS PRO",
                    shipping_preference: 'NO_SHIPPING',
                    user_action: 'PAY_NOW'
                }
            });
        },

        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                const finalEmail = document.getElementById('email_input').value.trim();
                const container = document.getElementById('paypal-button-container-pro');
                
                // Mensaje de éxito tras el pago
                container.innerHTML = `
                    <div style="padding: 25px; border: 2px solid #28a745; background-color: #f8fff9; color: #155724; border-radius: 12px; text-align: center; font-family: 'Segoe UI', sans-serif;">
                        <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
                        <h2 style="margin: 0 0 10px 0; color: #28a745; font-weight: bold;">¡Pago Exitoso!</h2>
                        <p style="font-size: 16px; margin-bottom: 8px;">Tu licencia de <b>Hive Utils Pro</b> ha sido vinculada a:</p>
                        <div style="background: #e9f7ef; padding: 10px; border-radius: 6px; display: inline-block; margin-bottom: 15px; border: 1px solid #c3e6cb;">
                            <b>${finalEmail}</b>
                        </div>
                        <hr style="border: 0; border-top: 1px solid #c3e6cb; margin: 15px 0;">
                        <p style="font-size: 13px; color: #6c757d;">Recibirás un correo de confirmación en breve. Ya puedes usar tus funciones Pro.</p>
                    </div>
                `;
            });
        },

        onError: function(err) {
            console.error("Error en el flujo de PayPal:", err);
            // Evitamos mostrar error si fue una cancelación manual por validación
            const userEmail = document.getElementById('email_input').value.trim();
            if (validarEmail(userEmail)) {
                alert("Ocurrió un error con la plataforma de pago. Por favor, intenta de nuevo.");
            }
        }
    }).render('#paypal-button-container-pro');
</script>
