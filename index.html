<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | HiveUtils Pro AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        input { padding: 15px; width: 90%; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #333; margin-top: 0;">Restablecer Contraseña</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Ingresa tu nueva clave segura para HiveUtils Pro AI.</p>
        
        <input type="password" id="passInput" placeholder="Mínimo 6 caracteres">
        <button id="saveBtn">ACTUALIZAR CONTRASEÑA</button>
        <p id="status"></p>
    </div>

    <script>
        // --- DETECTIVE DE TRÁFICO ---
        const params = new URLSearchParams(window.location.search);
        const hash = window.location.hash;
        
        // Si detecta 'signup' en cualquier parte (ruta o almohadilla)
        if (params.get('type') === 'signup' || hash.includes('type=signup') || window.location.href.includes('signup')) {
            console.log("¡Detección exitosa! Redirigiendo a Bienvenida...");
            window.location.replace("https://app.hiveutilsproai.com/welcome.html");
        }
        // ----------------------------
        const SB_URL = "https://kykbnqqdfhzzdtkpdwuy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5a2JucXFkZmh6emR0a3Bkd3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTc4MjksImV4cCI6MjA4ODkzMzgyOX0.jI7cburkLgjE2dtovKS4SSLrUNyzHA0Q8IubdYYu_a8"; 

        const supabase = supabasejs.createClient(SB_URL, SB_KEY);

        document.getElementById('saveBtn').onclick = async () => {
            const btn = document.getElementById('saveBtn');
            const status = document.getElementById('status');
            const password = document.getElementById('passInput').value;

            if (password.length < 6) {
                status.innerText = "❌ Mínimo 6 caracteres";
                status.style.color = "red";
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESANDO...";
            status.innerText = "";

            const { error } = await supabase.auth.updateUser({ password: password });

            if (error) {
                status.innerText = "Error: El enlace expiró o es inválido. Pide uno nuevo.";
                status.style.color = "red";
                btn.disabled = false;
                btn.innerText = "REINTENTAR";
            } else {
                status.innerText = "✅ ¡Éxito! Tu contraseña ha sido cambiada.";
                status.style.color = "green";
                btn.style.display = "none";
                document.getElementById('passInput').style.display = "none";
            }
        };
    </script>
</body>
</html>
