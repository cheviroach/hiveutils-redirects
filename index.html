<!DOCTYPE html>
<html>
<head>
    <script>
        const hash = window.location.hash;
        if (hash.includes("type=signup")) {
            // Es un registro nuevo -> Bienvenida
            window.location.replace("https://app.hiveutilsproai.com/welcome.html" + hash);
        } else if (hash.includes("type=recovery")) {
            // Es una recuperación -> Nueva página de password
            window.location.replace("https://app.hiveutilsproai.com/recovery.html" + hash);
        } else {
            // Por si acaso, si no hay nada, mandarlo a bienvenida o pagos
            window.location.replace("https://app.hiveutilsproai.com/welcome.html");
        }
    </script>
</head>
<body>
</body>
</html>
