<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membresía Elite Crypto | HIVEUTILS PRO AI</title>
    <style>
        :root {
            /* Paleta Premium Dark Crypto */
            --bg-main: #0B0E11;
            --bg-card: #181A20;
            --text-primary: #EAECEF;
            --text-secondary: #848E9C;
            --border-color: #2B3139;
            --binance-yellow: #FCD535;
            --binance-dark: #1E2329;
            --gold-gradient: linear-gradient(135deg, #FCD535 0%, #F39C12 100%);
            --danger: #F6465D;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 40px 10px;
            color: var(--text-primary);
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-section h1 {
            color: var(--text-primary);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .header-section p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .pro-badge {
            background: var(--gold-gradient);
            color: var(--binance-dark);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.5em;
            vertical-align: middle;
            font-weight: 900;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(252, 213, 53, 0.3);
        }

        .wallet-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .wallet-logos img {
            height: 40px;
            width: auto;
            max-width: 150px;
            object-fit: contain;
            opacity: 0.7;
            transition: all 0.3s ease;
            filter: grayscale(100%) brightness(200%);
        }

        .wallet-logos img:hover {
            opacity: 1;
            transform: scale(1.1);
            filter: grayscale(0%) brightness(100%);
        }

        .email-container {
            max-width: 450px;
            margin: 0 auto 40px;
            text-align: center;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .email-container label {
            display: block;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        #email_main {
            width: 100%;
            padding: 16px;
            background-color: var(--bg-main);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-align: center;
        }

        #email_main:focus {
            outline: none;
            border-color: var(--binance-yellow);
            box-shadow: 0 0 0 3px rgba(252, 213, 53, 0.15);
        }

        #email_main::placeholder { color: var(--text-secondary); }

        /* --- DE VUELTA A HORIZONTAL (EN FILA) --- */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto 40px;
        }

        /* --- EFECTO DE LEVANTAMIENTO SUPERIOR Y SOMBRAS 3D MANTENIDO --- */
        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); /* Sombra base */
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02); /* Salta hacia arriba y crece un poco */
            border-color: var(--binance-yellow);
            /* Sombra combinada oscura abajo y aura dorada alrededor */
            box-shadow: 0 25px 40px rgba(0,0,0,0.8), 0 0 25px rgba(252, 213, 53, 0.25);
            z-index: 10;
        }

        .card.popular { 
            border: 1px solid var(--binance-yellow); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 10px rgba(252, 213, 53, 0.1);
        }
        
        .popular-tag {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold-gradient);
            color: var(--binance-dark);
            padding: 5px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .plan-image {
            width: 100%;
            height: 140px;
            object-fit: contain;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
        }

        .card:hover .plan-image { transform: scale(1.05); }

        .btn-pay-crypto {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background-color: var(--binance-yellow);
            color: var(--binance-dark);
            border: none;
            padding: 16px 0;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: auto;
        }

        .binance-icon {
            height: 22px; 
            width: 22px;
            display: block;
            fill: var(--binance-dark);
            flex-shrink: 0;
        }

        .btn-pay-crypto:hover { 
            background-color: #f0c822;
            box-shadow: 0 0 20px rgba(252, 213, 53, 0.3);
        }

        .legal-notice {
            max-width: 850px;
            margin: 60px auto 20px;
            padding: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.7;
            text-align: center;
        }

        #email_error { color: var(--danger); display: none; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>

<script>
    function validateAndGetEmail() {
        const email = document.getElementById('email_main').value.trim();
        const error = document.getElementById('email_error');
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        if(!regex.test(email)) {
            error.style.display = 'block';
            document.getElementById('email_main').style.borderColor = 'var(--danger)';
            return null;
        }
        error.style.display = 'none';
        document.getElementById('email_main').style.borderColor = '#0ECB81'; /* Verde Binance éxito */
        return email;
    }

    async function processZenoPayment(amount, description, btnElement) {
        const email = validateAndGetEmail();
        if (!email) {
            document.getElementById('email_main').scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }

        const originalText = btnElement.innerHTML;
        btnElement.innerHTML = "Generando Orden... ⏳";
        btnElement.disabled = true;
        btnElement.style.opacity = "0.7";

        try {
            const response = await fetch("https://kykbnqqdfhzzdtkpdwuy.supabase.co/functions/v1/create-zeno-invoice", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount: amount, description: description, email: email })
            });

            const data = await response.json();

            if (data.checkoutUrl) {
                window.location.href = data.checkoutUrl; 
            } else {
                console.error("Error al generar link de Zeno:", data);
                alert("Error al conectar con Binance Pay. Intenta de nuevo.");
                btnElement.innerHTML = originalText;
                btnElement.disabled = false;
                btnElement.style.opacity = "1";
            }
        } catch (error) {
            console.error("Error de Red/Fetch:", error);
            alert("Error de conexión con el servidor.");
            btnElement.innerHTML = originalText;
            btnElement.disabled = false;
            btnElement.style.opacity = "1";
        }
    }
</script>
